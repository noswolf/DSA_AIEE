<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01526121 DSA: Singly Linked Lists (Python)</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            margin: 0;
        }
        .node-enter {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .list-container::-webkit-scrollbar { height: 8px; }
        .list-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .list-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .code-font { font-family: 'Fira Code', monospace; }

        /* Staging node overlay */
        .staging-overlay {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        .staging-overlay .staging-badge {
            animation: floatBounce 1s ease-in-out infinite alternate;
        }
        @keyframes floatBounce {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        /* Flowchart SVG */
        .flowchart-box { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const generateAddress = () => `0x${Math.floor(Math.random() * 0xFFFF).toString(16).toUpperCase().padStart(4, '0')}`;
        
        const Icon = ({ name, size = 20, color = "currentColor", className="" }) => {
            if (name === 'arrow-right') return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
            if (name === 'play') return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
            if (name === 'book') return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>;
            if (name === 'clock') return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
            if (name === 'refresh') return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
            if (name === 'repeat') return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>;
            if (name === 'cpu') return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>;
            return null;
        };

        const NodeVisual = ({ value, address, nextAddress, isNull, highlight, label, isNew }) => {
            if (isNull) return (
                <div className="flex flex-col items-center mx-2 opacity-60">
                    <div className="w-16 h-16 border-2 border-dashed border-gray-400 bg-gray-100 rounded flex items-center justify-center">
                        <span className="text-gray-500 font-bold">None</span>
                    </div>
                </div>
            );

            let borderColor = 'border-slate-300', ringClass = '', bgColor = 'bg-white';
            if (isNew) { borderColor = 'border-green-500'; ringClass = 'ring-2 ring-green-200'; bgColor = 'bg-green-50'; }
            else if (highlight) { borderColor = 'border-yellow-400'; ringClass = 'ring-2 ring-yellow-200'; }

            return (
                <div className={`flex flex-col items-center mx-2 transition-all duration-300 ${highlight || isNew ? 'transform scale-105' : ''}`}>
                    {label && (
                        <div className="mb-1 flex flex-col items-center node-enter">
                            <span className={`text-xs px-2 py-1 rounded-full mb-1 font-bold shadow-sm ${label.includes('Tail') && !label.includes('/') ? 'bg-slate-600 text-white' : 'bg-blue-600 text-white'}`}>{label}</span>
                            <div className={`w-0.5 h-4 ${label.includes('Tail') && !label.includes('/') ? 'bg-slate-600' : 'bg-blue-600'}`}></div>
                            <div className={`w-0 h-0 border-l-[4px] border-l-transparent border-r-[4px] border-r-transparent border-t-[6px] ${label.includes('Tail') && !label.includes('/') ? 'border-t-slate-600' : 'border-t-blue-600'}`}></div>
                        </div>
                    )}
                    <div className={`node-enter flex shadow-lg rounded-lg overflow-hidden border-2 ${borderColor} ${ringClass}`}>
                        <div className={`${bgColor} p-3 w-20 flex flex-col items-center justify-center border-r border-slate-200`}>
                            <span className="text-[10px] text-slate-400 uppercase font-bold">Data</span>
                            <span className="text-lg font-bold text-slate-800">{value}</span>
                        </div>
                        <div className="bg-slate-100 p-3 w-24 flex flex-col items-center justify-center relative">
                            <span className="text-[10px] text-slate-400 uppercase font-bold">Next</span>
                            <span className="code-font text-xs text-blue-600 font-bold">{nextAddress || 'None'}</span>
                        </div>
                    </div>
                    <div className="mt-2 code-font text-[10px] text-slate-500 bg-slate-100 px-2 py-0.5 rounded border border-slate-200">Addr: {address}</div>
                </div>
            );
        };

        const Arrow = () => (
            <div className="flex items-center justify-center w-12 text-slate-400">
                <Icon name="arrow-right" size={24} />
            </div>
        );

        // --- Flowchart Components ---
        const TraversalFlowchart = () => (
            <div className="flowchart-box mt-4 bg-slate-800 rounded-lg p-4 border border-slate-700">
                <p className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-3">Traversal Flowchart</p>
                <svg viewBox="0 0 300 280" className="w-full max-w-xs mx-auto">
                    {/* Start */}
                    <ellipse cx="150" cy="22" rx="50" ry="16" fill="#3b82f6" stroke="#1d4ed8" strokeWidth="1.5"/>
                    <text x="150" y="26" textAnchor="middle" fill="white" fontSize="11" fontWeight="bold">START</text>
                    {/* Arrow */}
                    <line x1="150" y1="38" x2="150" y2="55" stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)"/>
                    {/* Set current = head */}
                    <rect x="75" y="56" width="150" height="30" rx="4" fill="#1e293b" stroke="#475569" strokeWidth="1.5"/>
                    <text x="150" y="75" textAnchor="middle" fill="#94a3b8" fontSize="10">current = head</text>
                    {/* Arrow */}
                    <line x1="150" y1="86" x2="150" y2="103" stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)"/>
                    {/* Diamond: current != None? */}
                    <polygon points="150,104 230,128 150,152 70,128" fill="#7c3aed" stroke="#6d28d9" strokeWidth="1.5"/>
                    <text x="150" y="124" textAnchor="middle" fill="white" fontSize="9">current</text>
                    <text x="150" y="136" textAnchor="middle" fill="white" fontSize="9">!= None?</text>
                    {/* Yes arrow down */}
                    <line x1="150" y1="152" x2="150" y2="170" stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)"/>
                    <text x="160" y="165" fill="#22c55e" fontSize="10" fontWeight="bold">Yes</text>
                    {/* Process node */}
                    <rect x="75" y="171" width="150" height="30" rx="4" fill="#1e293b" stroke="#475569" strokeWidth="1.5"/>
                    <text x="150" y="190" textAnchor="middle" fill="#94a3b8" fontSize="10">Process current.data</text>
                    {/* Arrow */}
                    <line x1="150" y1="201" x2="150" y2="218" stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)"/>
                    {/* current = current.next */}
                    <rect x="75" y="219" width="150" height="30" rx="4" fill="#1e293b" stroke="#475569" strokeWidth="1.5"/>
                    <text x="150" y="238" textAnchor="middle" fill="#94a3b8" fontSize="10">current = current.next</text>
                    {/* Loop back line */}
                    <path d="M 75 234 Q 30 234 30 128 Q 30 104 70 128" stroke="#64748b" strokeWidth="1.5" fill="none" markerEnd="url(#arrow)"/>
                    {/* No arrow right */}
                    <line x1="230" y1="128" x2="260" y2="128" stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)"/>
                    <text x="237" y="122" fill="#ef4444" fontSize="10" fontWeight="bold">No</text>
                    {/* End */}
                    <ellipse cx="280" cy="128" rx="30" ry="16" fill="#10b981" stroke="#047857" strokeWidth="1.5"/>
                    <text x="280" y="132" textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">END</text>
                    <defs>
                        <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                            <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
                        </marker>
                    </defs>
                </svg>
            </div>
        );

        const InsertBeforeFlowchart = () => (
            <div className="flowchart-box mt-4 bg-white border border-slate-200 rounded-lg p-4">
                <p className="text-slate-600 text-xs font-bold uppercase tracking-wider mb-3">Insert Before (Middle) — Flowchart</p>
                <svg viewBox="0 0 300 240" className="w-full max-w-xs mx-auto">
                    <ellipse cx="150" cy="20" rx="50" ry="14" fill="#3b82f6" stroke="#1d4ed8" strokeWidth="1.5"/>
                    <text x="150" y="24" textAnchor="middle" fill="white" fontSize="11" fontWeight="bold">START</text>
                    <line x1="150" y1="34" x2="150" y2="50" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow2)"/>
                    {/* Traverse to prev */}
                    <rect x="60" y="51" width="180" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" strokeWidth="1.5"/>
                    <text x="150" y="68" textAnchor="middle" fill="#475569" fontSize="10">Traverse to prev node</text>
                    <line x1="150" y1="79" x2="150" y2="95" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow2)"/>
                    {/* Create new_node */}
                    <rect x="60" y="96" width="180" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" strokeWidth="1.5"/>
                    <text x="150" y="113" textAnchor="middle" fill="#475569" fontSize="10">Create new_node in memory</text>
                    <line x1="150" y1="124" x2="150" y2="140" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow2)"/>
                    {/* new_node.next = prev.next */}
                    <rect x="60" y="141" width="180" height="28" rx="4" fill="#fef3c7" stroke="#d97706" strokeWidth="1.5"/>
                    <text x="150" y="158" textAnchor="middle" fill="#92400e" fontSize="10">new_node.next = prev.next</text>
                    <line x1="150" y1="169" x2="150" y2="185" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow2)"/>
                    {/* prev.next = new_node */}
                    <rect x="60" y="186" width="180" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" strokeWidth="1.5"/>
                    <text x="150" y="203" textAnchor="middle" fill="#14532d" fontSize="10">prev.next = new_node</text>
                    <line x1="150" y1="214" x2="150" y2="227" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow2)"/>
                    <ellipse cx="150" cy="234" rx="40" ry="13" fill="#10b981" stroke="#047857" strokeWidth="1.5"/>
                    <text x="150" y="238" textAnchor="middle" fill="white" fontSize="11" fontWeight="bold">DONE</text>
                    <defs>
                        <marker id="arrow2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                            <path d="M0,0 L0,6 L6,3 z" fill="#94a3b8"/>
                        </marker>
                    </defs>
                </svg>
            </div>
        );

        const DeleteFlowchart = () => (
            <div className="flowchart-box mt-4 bg-white border border-slate-200 rounded-lg p-4">
                <p className="text-slate-600 text-xs font-bold uppercase tracking-wider mb-3">Delete Middle Node — Flowchart</p>
                <svg viewBox="0 0 300 240" className="w-full max-w-xs mx-auto">
                    <ellipse cx="150" cy="20" rx="50" ry="14" fill="#3b82f6" stroke="#1d4ed8" strokeWidth="1.5"/>
                    <text x="150" y="24" textAnchor="middle" fill="white" fontSize="11" fontWeight="bold">START</text>
                    <line x1="150" y1="34" x2="150" y2="50" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow3)"/>
                    <rect x="55" y="51" width="190" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" strokeWidth="1.5"/>
                    <text x="150" y="68" textAnchor="middle" fill="#475569" fontSize="10">Traverse to prev (before target)</text>
                    <line x1="150" y1="79" x2="150" y2="95" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow3)"/>
                    <rect x="55" y="96" width="190" height="28" rx="4" fill="#fff7ed" stroke="#ea580c" strokeWidth="1.5"/>
                    <text x="150" y="113" textAnchor="middle" fill="#9a3412" fontSize="10">temp = prev.next (node to delete)</text>
                    <line x1="150" y1="124" x2="150" y2="140" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow3)"/>
                    <rect x="55" y="141" width="190" height="28" rx="4" fill="#dcfce7" stroke="#16a34a" strokeWidth="1.5"/>
                    <text x="150" y="158" textAnchor="middle" fill="#14532d" fontSize="10">prev.next = temp.next</text>
                    <line x1="150" y1="169" x2="150" y2="185" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow3)"/>
                    <rect x="55" y="186" width="190" height="28" rx="4" fill="#fce7f3" stroke="#be185d" strokeWidth="1.5"/>
                    <text x="150" y="203" textAnchor="middle" fill="#831843" fontSize="10">GC reclaims temp's memory</text>
                    <line x1="150" y1="214" x2="150" y2="227" stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow3)"/>
                    <ellipse cx="150" cy="234" rx="40" ry="13" fill="#10b981" stroke="#047857" strokeWidth="1.5"/>
                    <text x="150" y="238" textAnchor="middle" fill="white" fontSize="11" fontWeight="bold">DONE</text>
                    <defs>
                        <marker id="arrow3" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                            <path d="M0,0 L0,6 L6,3 z" fill="#94a3b8"/>
                        </marker>
                    </defs>
                </svg>
            </div>
        );

        // --- Main App ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('structure');
            const [list, setList] = useState([]);
            const [logs, setLogs] = useState(["Welcome to the Linked List module."]);
            const [highlightIndex, setHighlightIndex] = useState(null);
            const [pointerLabel, setPointerLabel] = useState({});
            const [stagingNode, setStagingNode] = useState(null);
            const [speed, setSpeed] = useState(1);

            const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms / speed));
            const log = (msg) => setLogs(prev => [msg, ...prev]);

            const resetList = () => {
                setHighlightIndex(null);
                setPointerLabel({});
                setStagingNode(null);
                setLogs([`Resetting environment for ${activeTab}...`]);
                if (activeTab === 'traversal' || activeTab === 'insertion' || activeTab === 'deletion' || activeTab === 'circular') {
                    const addr1 = generateAddress(), addr2 = generateAddress(), addr3 = generateAddress();
                    let nodes = [
                        { id: 1, value: 10, address: addr1, next: addr2 },
                        { id: 2, value: 45, address: addr2, next: addr3 },
                        { id: 3, value: 99, address: addr3, next: null },
                    ];
                    if (activeTab === 'traversal') {
                        const used = new Set();
                        nodes = nodes.map(n => { let s; do { s = Math.floor(Math.random() * 16); } while(used.has(s)); used.add(s); return { ...n, memorySlot: s }; });
                    }
                    setList(nodes);
                    setPointerLabel({ 0: 'head' });
                } else {
                    setList([]);
                }
            };

            useEffect(() => { resetList(); }, [activeTab]);

            const getNodeLabel = (index) => {
                let label = pointerLabel[index] || "";
                if (index === list.length - 1) label = label ? label + " / Tail" : "Tail";
                return label || null;
            };

            const createHead = async () => {
                log("Allocating memory for Head node...");
                const addr = generateAddress();
                const newNode = { id: Date.now(), value: Math.floor(Math.random() * 100), address: addr, next: null };
                setStagingNode(newNode);
                await wait(1000);
                setStagingNode(null);
                setList([newNode]);
                setPointerLabel({ 0: 'head' });
                log(`Head created at ${addr}.`);
            };

            const appendNode = async () => {
                log("Creating new node...");
                const newAddr = generateAddress();
                const newNode = { id: Date.now(), value: Math.floor(Math.random() * 100), address: newAddr, next: null };
                setStagingNode(newNode);
                await wait(1000);
                if (list.length === 0) { setStagingNode(null); setList([newNode]); setPointerLabel({ 0: 'head' }); log("List was empty. New node becomes Head."); return; }
                log("Traversing to Tail...");
                const newList = [...list];
                newList[newList.length - 1].next = newAddr;
                setStagingNode(null);
                setList([...newList, newNode]);
                log(`Updated previous tail.next to ${newAddr}.`);
            };

            const traverseList = async () => {
                log("Starting Traversal...");
                for (let i = 0; i < list.length; i++) {
                    setHighlightIndex(i);
                    setPointerLabel({ 0: 'head', [i]: 'current' });
                    log(`Visiting Node at ${list[i].address}. Value: ${list[i].value}.`);
                    await wait(1000);
                }
                setHighlightIndex(null);
                setPointerLabel({ 0: 'head' });
                log("Traversal Complete. current is None.");
            };

            const insertHead = async () => {
                log("Step 1: Create new node object in memory.");
                const newAddr = generateAddress();
                const newVal = Math.floor(Math.random() * 100);
                const oldHeadAddr = list.length > 0 ? list[0].address : null;
                const newNodeObj = { id: Date.now(), value: newVal, address: newAddr, next: oldHeadAddr };
                setStagingNode(newNodeObj);
                await wait(1000);
                log(`Step 2: Set new_node.next = head (${oldHeadAddr || 'None'}).`);
                await wait(800);
                log("Step 3: Update head = new_node.");
                setStagingNode(null);
                setList([newNodeObj, ...list]);
                setPointerLabel({ 0: 'head' });
                setHighlightIndex(0);
                await wait(500);
                setHighlightIndex(null);
            };

            const insertAtIndex1 = async () => {
                if (list.length < 2) { log("Need at least 2 nodes to demonstrate insert between."); return; }
                log("Step 1: Traverse to index 0 (prev).");
                setHighlightIndex(0);
                setPointerLabel({ 0: 'head/prev' });
                await wait(1000);
                log("Step 2: Create new node.");
                const newAddr = generateAddress();
                const nextNodeAddr = list[1].address;
                const newNodeObj = { id: Date.now(), value: 77, address: newAddr, next: nextNodeAddr };
                setStagingNode(newNodeObj);
                await wait(1200);
                log(`Step 3: Set new_node.next = prev.next (${nextNodeAddr}).`);
                await wait(800);
                log(`Step 4: Set prev.next = new_node (${newAddr}).`);
                const newList = [...list];
                newList.splice(1, 0, newNodeObj);
                newList[0].next = newAddr;
                setStagingNode(null);
                setList(newList);
                setHighlightIndex(1);
                setPointerLabel({ 0: 'head', 1: 'new_node' });
                await wait(1500);
                setHighlightIndex(null);
                setPointerLabel({ 0: 'head' });
            };

            const insertTail = async () => {
                if(list.length === 0) { createHead(); return; }
                log("Step 1: Create new node.");
                const newAddr = generateAddress();
                const newNodeObj = { id: Date.now(), value: Math.floor(Math.random() * 100), address: newAddr, next: null };
                setStagingNode(newNodeObj);
                await wait(1000);
                log("Step 2: Traverse to find current tail.");
                for(let i=0; i<list.length; i++) {
                    setHighlightIndex(i);
                    setPointerLabel({ 0: 'head', [i]: 'current' });
                    await wait(400);
                }
                log(`Step 3: Set current.next = new_node (${newAddr}).`);
                const newList = [...list];
                newList[newList.length-1].next = newAddr;
                setStagingNode(null);
                setList([...newList, newNodeObj]);
                setHighlightIndex(newList.length);
                setPointerLabel({ 0: 'head', [newList.length]: 'tail' });
                await wait(1000);
                setHighlightIndex(null);
                setPointerLabel({ 0: 'head' });
            };

            const deleteHead = async () => {
                if(list.length === 0) return;
                log("Step 1: Identify current head.");
                setHighlightIndex(0);
                await wait(800);
                const newList = [...list];
                newList.shift();
                log(`Step 2: Update head = head.next.`);
                setList(newList);
                setPointerLabel({ 0: 'head' });
                setHighlightIndex(null);
                if (newList.length > 0) log(`Head is now at ${newList[0].address}.`);
                else log("List is now empty.");
            };

            const deleteMiddle = async () => {
                if(list.length < 3) { log("Need more nodes to show middle deletion."); return; }
                log("Step 1: Traverse to node BEFORE the one to delete (prev).");
                setHighlightIndex(0);
                setPointerLabel({ 0: 'head/prev' });
                await wait(1000);
                log("Step 2: Identify node to delete (temp).");
                setHighlightIndex(1);
                setPointerLabel({ 0: 'head/prev', 1: 'temp' });
                await wait(1000);
                const newList = [...list];
                newList.splice(1, 1);
                if (newList.length > 1) newList[0].next = newList[1].address;
                else newList[0].next = null;
                log("Step 3: prev.next = temp.next. Garbage Collector frees temp.");
                setList(newList);
                setHighlightIndex(null);
                setPointerLabel({ 0: 'head' });
            };

            const deleteTail = async () => {
                if(list.length === 0) return;
                if(list.length === 1) {
                    log("Only 1 node. Deleting Head/Tail.");
                    setHighlightIndex(0);
                    await wait(800);
                    setList([]);
                    setPointerLabel({});
                    setHighlightIndex(null);
                    log("List is now empty.");
                    return;
                }
                log("Step 1: Traverse to second-to-last node.");
                for(let i=0; i < list.length - 1; i++) {
                    setHighlightIndex(i);
                    setPointerLabel({ 0: 'head', [i]: 'current' });
                    await wait(500);
                }
                const secondLastIndex = list.length - 2;
                setHighlightIndex(secondLastIndex);
                setPointerLabel({ 0: 'head', [secondLastIndex]: 'current', [list.length - 1]: 'to_delete' });
                log("Found second-to-last node. This will become the new Tail.");
                await wait(1000);
                log("Step 2: Update current.next = None.");
                const newList = list.slice(0, list.length - 1);
                newList[newList.length - 1] = { ...newList[newList.length - 1], next: null };
                setList(newList);
                setPointerLabel({ 0: 'head', [newList.length - 1]: 'tail' });
                setHighlightIndex(newList.length - 1);
                log("Tail deleted.");
                await wait(1000);
                setHighlightIndex(null);
                setPointerLabel({ 0: 'head' });
            };

            const renderSpeedControls = () => (
                <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
                    <Icon name="clock" size={16} className="text-slate-500 ml-2" />
                    <span className="text-xs font-bold text-slate-500 uppercase mr-1">Speed</span>
                    {[0.5, 1, 2].map(s => (
                        <button key={s} onClick={() => setSpeed(s)} className={`px-2 py-1 text-xs font-bold rounded ${speed === s ? 'bg-white text-blue-600 shadow' : 'text-slate-400 hover:text-slate-600'}`}>{s}x</button>
                    ))}
                </div>
            );

            const renderStructureTab = () => (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                        <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <Icon name="book" className="text-blue-600"/> What is a Singly Linked List?
                        </h3>
                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded mb-4">
                            <p className="text-blue-900 text-sm">
                                A <strong>Singly Linked List</strong> is a linear data structure where elements (nodes) are <em>not</em> stored in contiguous memory. 
                                Instead, each node stores its <strong>data</strong> and a <strong>pointer (next)</strong> to the next node, forming a chain.
                            </p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm mb-6">
                            <div className="p-3 bg-green-50 border border-green-200 rounded">
                                <strong className="text-green-800 block mb-1">✓ Advantages</strong>
                                <ul className="text-green-700 text-xs space-y-1 list-disc ml-3">
                                    <li>Dynamic size — grows/shrinks at runtime</li>
                                    <li>O(1) insert/delete at Head</li>
                                    <li>No pre-allocation needed</li>
                                </ul>
                            </div>
                            <div className="p-3 bg-red-50 border border-red-200 rounded">
                                <strong className="text-red-800 block mb-1">✗ Disadvantages</strong>
                                <ul className="text-red-700 text-xs space-y-1 list-disc ml-3">
                                    <li>O(n) access by index</li>
                                    <li>Extra memory for next pointer</li>
                                    <li>Not cache-friendly</li>
                                </ul>
                            </div>
                            <div className="p-3 bg-purple-50 border border-purple-200 rounded">
                                <strong className="text-purple-800 block mb-1">🔄 Use Cases</strong>
                                <ul className="text-purple-700 text-xs space-y-1 list-disc ml-3">
                                    <li>Undo/Redo stacks</li>
                                    <li>Implementing queues</li>
                                    <li>Hash table chaining</li>
                                </ul>
                            </div>
                        </div>
                        <h4 className="font-bold text-slate-700 mb-3">Anatomy of a Node</h4>
                        <p className="text-slate-600 text-sm mb-4">In Python, a node is simply an instance of a <strong>Class</strong>. It contains the <strong>data</strong> and a <strong>reference (next)</strong> to the next node object.</p>
                        <div className="bg-slate-800 p-4 rounded text-slate-200 text-sm font-mono border-l-4 border-blue-500">
                            <div className="text-purple-400 inline">class</div> <span className="text-yellow-400">Node</span>:<br/>
                            &nbsp;&nbsp;<div className="text-purple-400 inline">def</div> <span className="text-blue-400">__init__</span>(self, data):<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;self.data = data<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;self.next = <span className="text-purple-400">None</span>
                        </div>
                    </div>
                </div>
            );

            const renderCreationTab = () => (
                <div className="space-y-4">
                    <div className="flex gap-4 mb-4">
                        <button onClick={createHead} disabled={list.length > 0} className="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 disabled:opacity-50">Initialize Head</button>
                        <button onClick={appendNode} disabled={list.length === 0} className="px-4 py-2 bg-green-600 text-white rounded shadow hover:bg-green-700 disabled:opacity-50">Append Node</button>
                    </div>
                    <div className="bg-blue-50 p-4 rounded text-sm text-blue-800 border-l-4 border-blue-600">
                        <strong>Logic:</strong> When you create the first node, the <code>head</code> variable refers to it. Subsequent nodes are linked by updating <code>current.next</code> to point to the new node instance.
                    </div>
                    <p className="text-slate-600 text-sm">Use the buttons to build a list. Note how <code>next</code> pointers update.</p>
                </div>
            );

            const renderTraversalTab = () => {
                const memSlots = 16;
                return (
                    <div className="space-y-4">
                        <div className="flex items-center justify-between">
                            <button onClick={traverseList} className="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded shadow hover:bg-indigo-700">
                                <Icon name="play" size={16}/> Simulate Traversal
                            </button>
                            {renderSpeedControls()}
                        </div>
                        <div className="bg-slate-50 p-3 rounded text-sm text-slate-700 border border-slate-200">
                            <strong>Algorithm:</strong> Start at <code>head</code>. While <code>current != None</code>, process data, then <code>current = current.next</code>.
                        </div>
                        <TraversalFlowchart />
                        <div className="mt-4 bg-slate-800 p-4 rounded-lg shadow-inner border border-slate-700">
                            <div className="flex items-center gap-2 mb-3">
                                <Icon name="cpu" size={18} className="text-indigo-400" />
                                <h4 className="text-slate-300 text-xs font-bold uppercase tracking-wider">Simulated Memory Lane (RAM)</h4>
                            </div>
                            <div className="grid grid-cols-8 gap-2">
                                {Array.from({length: memSlots}).map((_, i) => {
                                    const nodeInSlot = list.find(n => n.memorySlot === i);
                                    const isActive = highlightIndex !== null && list[highlightIndex] && list[highlightIndex].memorySlot === i;
                                    return (
                                        <div key={i} className={`relative h-12 rounded border flex flex-col items-center justify-center text-[10px] transition-all duration-300 ${isActive ? 'bg-yellow-400 border-yellow-500 scale-110 z-10 shadow-[0_0_15px_rgba(250,204,21,0.6)] text-slate-900 font-bold' : nodeInSlot ? 'bg-blue-600 border-blue-500 text-white' : 'bg-slate-700/50 border-slate-600 text-slate-600'}`}>
                                            <span className="absolute top-0.5 right-1 text-[8px] opacity-60">{i.toString(16).toUpperCase()}</span>
                                            {nodeInSlot ? (
                                                <div className="flex flex-col items-center">
                                                    <span className="text-xs">{nodeInSlot.value}</span>
                                                    {isActive && <span className="text-[8px] animate-pulse">READ</span>}
                                                </div>
                                            ) : <span className="text-xl leading-none opacity-20">.</span>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderInsertionTab = () => (
                <div className="space-y-4">
                    <div className="flex flex-wrap gap-2 mb-4">
                        <button onClick={insertHead} className="px-4 py-2 bg-teal-600 text-white rounded shadow hover:bg-teal-700 text-sm">Insert at Head</button>
                        <button onClick={insertAtIndex1} className="px-4 py-2 bg-teal-600 text-white rounded shadow hover:bg-teal-700 text-sm">Insert at Index 1 (Between)</button>
                        <button onClick={insertTail} className="px-4 py-2 bg-teal-600 text-white rounded shadow hover:bg-teal-700 text-sm">Insert at Tail</button>
                    </div>
                    <div className="bg-teal-50 border border-teal-200 p-3 rounded text-sm text-teal-800">
                        <strong>Visual Guide:</strong> Green node = Newly created node (Memory allocated). Watch it appear above the list, then get linked in.
                    </div>
                    <InsertBeforeFlowchart />
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm mt-4">
                        <div className="p-3 bg-white border border-slate-200 rounded">
                            <strong className="block text-slate-800 mb-1">Insert Head</strong>
                            <div className="text-xs text-slate-500 mb-2">Big O: <strong>O(1)</strong></div>
                            <p className="text-slate-600">Fastest. <br/> <code>new_node.next = head</code>, then <code>head = new_node</code>.</p>
                        </div>
                        <div className="p-3 bg-white border border-slate-200 rounded">
                            <strong className="block text-slate-800 mb-1">Insert Middle</strong>
                            <div className="text-xs text-slate-500 mb-2">Big O: <strong>O(n)</strong></div>
                            <p className="text-slate-600">Must traverse to find insertion point.</p>
                        </div>
                        <div className="p-3 bg-white border border-slate-200 rounded">
                            <strong className="block text-slate-800 mb-1">Insert Tail</strong>
                            <div className="text-xs text-slate-500 mb-2">Big O: <strong>O(n)*</strong></div>
                            <p className="text-slate-600">*O(n) traversing from Head. O(1) with a <code>tail</code> reference.</p>
                        </div>
                    </div>
                </div>
            );

            const renderDeletionTab = () => (
                <div className="space-y-4">
                    <div className="flex flex-wrap gap-2 mb-4">
                        <button onClick={deleteHead} className="px-4 py-2 bg-red-600 text-white rounded shadow hover:bg-red-700 text-sm">Delete Head</button>
                        <button onClick={deleteMiddle} className="px-4 py-2 bg-red-600 text-white rounded shadow hover:bg-red-700 text-sm">Delete at Index 1</button>
                        <button onClick={deleteTail} className="px-4 py-2 bg-red-600 text-white rounded shadow hover:bg-red-700 text-sm">Delete Tail</button>
                    </div>
                    <div className="bg-red-50 border border-red-200 p-4 rounded">
                        <h4 className="text-red-800 font-bold mb-2">Python Garbage Collection</h4>
                        <p className="text-sm text-red-700">When we change references (e.g., <code>prev.next = current.next</code>), the skipped node is no longer referenced. Python's <strong>Garbage Collector</strong> automatically cleans this up.</p>
                    </div>
                    <DeleteFlowchart />
                    <div className="flex gap-4 text-sm mt-2">
                        <div className="p-2 bg-white border rounded shadow-sm">Delete Head: <strong>O(1)</strong></div>
                        <div className="p-2 bg-white border rounded shadow-sm">Delete Middle/Tail: <strong>O(n)</strong></div>
                    </div>
                </div>
            );

            const renderCircularTab = () => (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                        <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <Icon name="repeat" className="text-purple-600"/> Circular Linked Lists
                        </h3>
                        <p className="text-slate-600 mb-4">In a Circular Linked List, the <strong>Tail</strong> node does not point to <code>None</code>. Instead, it points back to the <strong>Head</strong>.</p>
                        <div className="bg-purple-50 border-l-4 border-purple-500 p-4 rounded mb-6">
                            <h4 className="font-bold text-purple-800 mb-2">Key Differences</h4>
                            <ul className="list-disc ml-5 space-y-2 text-sm text-purple-900">
                                <li><strong>Traversal:</strong> Use <code>while current.next != head</code> instead of checking for <code>None</code>.</li>
                                <li><strong>Insert Tail:</strong> New node's <code>next</code> must point to <code>head</code>, not <code>None</code>.</li>
                                <li><strong>Applications:</strong> Round-robin scheduling, multiplayer games, streaming buffers.</li>
                            </ul>
                        </div>
                        <div className="bg-slate-800 p-4 rounded text-slate-200 text-sm font-mono">
                            <span className="text-slate-500"># Setting up the circular link manually</span><br/>
                            head = Node(10)<br/>
                            second = Node(20)<br/>
                            head.next = second<br/>
                            second.next = <span className="text-purple-400">head</span> <span className="text-slate-500"># Points back to start!</span>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-10">
                        <div className="p-6 border-b border-slate-800">
                            <h1 className="text-xl font-bold text-white tracking-tight mb-2">Linked Lists</h1>
                            <p className="text-xs text-slate-500 font-medium">01526121 Data Structures and Algorithms</p>
                            <p className="text-xs text-slate-500 mt-1">Singly Linked List Guide</p>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            {[
                                { id: 'structure', label: '1. Basic Structure' },
                                { id: 'creation', label: '2. Creation' },
                                { id: 'traversal', label: '3. Traversal' },
                                { id: 'insertion', label: '4. Insertion' },
                                { id: 'deletion', label: '5. Deletion' },
                                { id: 'circular', label: '6. Circular Lists' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)}
                                    className={`w-full text-left px-4 py-3 rounded transition-colors ${activeTab === item.id ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}>
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        <header className="bg-white border-b border-slate-200 p-6 flex justify-between items-center">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800 capitalize">{activeTab} Linked List</h2>
                                <p className="text-xs text-slate-500">Interactive Simulation</p>
                            </div>
                            <div className="flex items-center gap-4">
                                {activeTab !== 'structure' && (
                                    <button onClick={resetList} className="flex items-center gap-2 px-3 py-1 bg-white border border-slate-300 text-slate-600 rounded hover:bg-slate-50 text-xs font-bold uppercase shadow-sm">
                                        <Icon name="refresh" size={14} /> Reset
                                    </button>
                                )}
                                {renderSpeedControls()}
                                <div className="text-sm bg-slate-100 px-3 py-1 rounded text-slate-600">Nodes: {list.length}</div>
                            </div>
                        </header>

                        {/* Visualization Area */}
                        <div className="flex-1 bg-slate-50 p-6 overflow-x-auto overflow-y-hidden flex items-center relative list-container">
                            {/* Staging Node — floats above, centered, no push */}
                            {stagingNode && (
                                <div className="staging-overlay">
                                    <div className="staging-badge flex flex-col items-center bg-white/90 backdrop-blur-sm p-3 rounded-xl shadow-xl border border-green-200">
                                        <span className="text-xs font-bold text-green-700 bg-green-100 px-3 py-1 rounded-full mb-2 animate-pulse">⚡ Allocating Memory...</span>
                                        <NodeVisual value={stagingNode.value} address={stagingNode.address} nextAddress={stagingNode.next} isNew={true} />
                                    </div>
                                </div>
                            )}

                            {activeTab === 'structure' ? (
                                <div className="w-full h-full flex items-center justify-center text-slate-400 italic">
                                    Select other tabs to build the list
                                </div>
                            ) : (
                                <div className="flex items-center min-w-max px-4">
                                    <React.Fragment>
                                        <NodeVisual value={list.length} address="0xHEAD" nextAddress={list.length > 0 ? list[0].address : 'None'} isHeader={true} label="Sentinel" />
                                        <Arrow />
                                    </React.Fragment>
                                    {list.length === 0 ? <NodeVisual isNull={true} /> : (
                                        <React.Fragment>
                                            {list.map((node, index) => {
                                                let nextAddressOverride = node.next;
                                                if (activeTab === 'circular' && index === list.length - 1 && list.length > 0) nextAddressOverride = list[0].address;
                                                return (
                                                    <React.Fragment key={node.id}>
                                                        <NodeVisual value={node.value} address={node.address} nextAddress={nextAddressOverride} highlight={highlightIndex === index} label={getNodeLabel(index)} isNew={highlightIndex === index && activeTab === 'insertion'} />
                                                        {index < list.length - 1 && <Arrow />}
                                                    </React.Fragment>
                                                );
                                            })}
                                            {activeTab === 'circular' && list.length > 0 ? (
                                                <div className="flex flex-col items-center text-purple-400 mx-2 animate-pulse">
                                                    <div className="border-b-2 border-dashed border-purple-400 w-12 mb-1"></div>
                                                    <Icon name="repeat" size={32} />
                                                    <span className="text-[10px] uppercase font-bold mt-1">Loop to Head</span>
                                                </div>
                                            ) : (
                                                <React.Fragment>
                                                    {list.length > 0 && <Arrow />}
                                                    <NodeVisual isNull={true} />
                                                </React.Fragment>
                                            )}
                                        </React.Fragment>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Controls & Info Panel */}
                        <div className="h-2/5 bg-white border-t border-slate-200 flex flex-col md:flex-row overflow-hidden">
                            <div className="flex-1 p-6 overflow-y-auto border-r border-slate-100">
                                {activeTab === 'structure' && renderStructureTab()}
                                {activeTab === 'creation' && renderCreationTab()}
                                {activeTab === 'traversal' && renderTraversalTab()}
                                {activeTab === 'insertion' && renderInsertionTab()}
                                {activeTab === 'deletion' && renderDeletionTab()}
                                {activeTab === 'circular' && renderCircularTab()}
                            </div>
                            <div className="w-full md:w-80 bg-slate-900 text-slate-300 p-4 font-mono text-xs overflow-y-auto flex flex-col">
                                <div className="font-bold text-slate-500 mb-2 uppercase border-b border-slate-700 pb-1">System Log</div>
                                <div className="flex-1 space-y-1">
                                    {logs.map((l, i) => (
                                        <div key={i} className="border-l-2 border-blue-500 pl-2 py-0.5">
                                            <span className="text-blue-400 opacity-50">[{logs.length - i}]</span> {l}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
